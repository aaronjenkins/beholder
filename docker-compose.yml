services:
  db:
    image: postgres:16-alpine
    container_name: beholder-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: beholder
      POSTGRES_USER: beholder
      POSTGRES_PASSWORD: beholder
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beholder"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: beholder
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://beholder:beholder@db:5432/beholder
      - API_KEY=${API_KEY}
      - YT_KEY=${YT_KEY}
      - REFRESH_INTERVAL=900
      - ADMIN_PHONE_NUM=${ADMIN_PHONE_NUM}
      - ADMIN_SECRET=${ADMIN_SECRET}
      - STYTCH_PROJECT_ID=${STYTCH_PROJECT_ID}
      - STYTCH_SECRET=${STYTCH_SECRET}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_PREFIX=${S3_PREFIX:-beholder/backups}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
